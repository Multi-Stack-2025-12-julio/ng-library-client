resources:
  repositories:
  - repository: shared-pipelines
    type: github
    name: 'Multi-Stack-2025-12-julio/shared-pipelines'
    endpoint: 'Multi-Stack-2025-12-julio'

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - '*'

extends:
  template: triggers/trigger-angular-template.yml@shared-pipelines
  parameters:
    SharedPipelinesRepositoryName: 'Multi-Stack-2025-12-julio/shared-pipelines'
    SharedPipelinesEndpoint: 'Multi-Stack-2025-12-julio'
    ProjectName: 'ng-library-client'
